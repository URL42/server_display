services:
  server_display:
    build: .
    container_name: server_display
    restart: unless-stopped
    ports:
      - "8099:8099"
    volumes:
      - ./data:/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8099/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
