services:
  bossbitch:
    build: ./server
    container_name: bossbitch
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./data:/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
